/* ══════════════════════════════════════════
   FETCH — NWS PRESSURE (gridpoints)
   Used for frontal timing analysis.
   Only fetched on FRONTAL/BIMODAL regime days.
══════════════════════════════════════════ */
async function fetchPressure(key) {
  // Now also fetches mixing height — same griddata endpoint, no extra cost
  try {
    const c = ST[key];
    const H = {'User-Agent':'KalshiWeatherDesk/1.0'};
    const grid = await fetchGridpoints(key); // uses cache
    const gridUrl = grid?.forecastGridData;
    if (!gridUrl) return null;
    const r = await fetch(gridUrl, {headers:H});
    if (!r.ok) return null;
    const gd = await r.json();

    function parseGridLayer(layer, unitDivisor) {
      if (!layer?.values?.length) return [];
      const uom = layer.uom || '';
      const div = unitDivisor ?? (uom.includes('Pa') && !uom.includes('hPa') ? 100 : 1);
      const out = [];
      layer.values.forEach(v => {
        if (v.value === null) return;
        const tPart = v.validTime.split('/')[0];
        const dt = new Date(tPart);
        const val = +(v.value / div).toFixed(1);
        const h = parseInt(dt.toLocaleString('en-US',
          {timeZone:c.tz, hour:'2-digit', hour12:false}));
        const hr = (h === 24 ? 0 : h);
        out.push({hour:isNaN(hr)?0:hr, val, utc:dt,
                  localDate:dt.toLocaleDateString('en-CA',{timeZone:c.tz})});
      });
      return out;
    }

    // Pressure: Pa -> hPa, filter to 900-1100 range
    const pressureRaw = parseGridLayer(gd.properties?.pressure);
    const pressure = pressureRaw
      .filter(p => p.val >= 900 && p.val <= 1100)
      .map(p => ({...p, hPa: p.val}));

    // Mixing height: metres -> feet (1m = 3.28084ft)
    // Low mixing height = inversion present
    const mixingRaw = parseGridLayer(gd.properties?.mixingHeight, 1);
    const mixingHeight = mixingRaw.map(p => ({
      ...p,
      metres: p.val,
      feet: Math.round(p.val * 3.28084)
    }));

    // Wind at surface (for downslope detection later)
    const windDir = parseGridLayer(gd.properties?.windDirection, 1);

    return {pressure, mixingHeight, windDir};
  } catch(e) { return null; }
}

/* ══════════════════════════════════════════
   FRONTAL POSITION ANALYSIS
   Uses METAR pressure tendency and wind shift
   to determine if front is pre/near/post passage
══════════════════════════════════════════ */
function analyzeFrontalPosition(metar24h, forecastPressure, peakHour) {
  if (!metar24h?.length) return null;

  // 1. Pressure tendency from METAR altim (3-hour window)
  const now = metar24h[0];
  const threeHrsAgo = metar24h.find(m => {
    const ageHrs = (new Date(metar24h[0].reportTime) - new Date(m.reportTime)) / 3600000;
    return ageHrs >= 2 && ageHrs <= 4;
  });

  let tendency = null, tendencyHpa = null;
  if (now?.altim && threeHrsAgo?.altim) {
    tendencyHpa = +((now.altim - threeHrsAgo.altim) * 33.8639).toFixed(1);
    // +ve = rising = post-frontal, -ve = falling = pre-frontal
    tendency = tendencyHpa > 0.8 ? 'rising' : tendencyHpa < -0.8 ? 'falling' : 'steady';
  }

  // 2. Wind shift detection (SW/S to NW/N = frontal passage)
  const recentWinds = metar24h.slice(0, 4).map(m => m.wdir).filter(Boolean);
  let windShift = null;
  if (recentWinds.length >= 2) {
    const latest = recentWinds[0];
    const earlier = recentWinds[recentWinds.length - 1];
    const wasWarm = earlier >= 150 && earlier <= 270;
    const isPost  = latest >= 270 || latest <= 60;
    if (wasWarm && isPost) windShift = 'post-frontal shift detected';
  }

  // 3. Forecast pressure minimum hour (when front expected)
  let forecastFrontHour = null;
  if (forecastPressure?.length) {
    let minP = Infinity, minHour = null;
    forecastPressure.forEach(p => {
      if (p.hPa < minP) { minP = p.hPa; minHour = p.hour; }
    });
    forecastFrontHour = minHour;
  }

  // 4. Determine position
  let position, label, cls;
  if (windShift || tendency === 'rising') {
    position = 'post';
    const gap = forecastFrontHour !== null
      ? `~${Math.abs(forecastFrontHour - (new Date().getHours()))}h early`
      : '';
    label = 'POST-FRONTAL' + (gap ? ' ' + gap : '');
    cls = 'front-post';
  } else if (tendency === 'falling') {
    const frontSoon = forecastFrontHour !== null
      && Math.abs(forecastFrontHour - new Date().getHours()) <= 3;
    position = frontSoon ? 'near' : 'pre';
    label = frontSoon ? 'FRONT IMMINENT' : 'PRE-FRONTAL';
    cls = frontSoon ? 'front-near' : 'front-pre';
  } else {
    position = 'clear';
    label = tendency === 'steady' && forecastFrontHour !== null
      ? 'FRONT ~' + (forecastFrontHour > 12
          ? (forecastFrontHour - 12) + ' PM'
          : forecastFrontHour + ' AM')
      : 'STEADY';
    cls = 'front-clear';
  }

  return {
    position, label, cls,
    tendencyHpa, tendency, windShift,
    forecastFrontHour,
    peakBeforeFront: forecastFrontHour !== null && peakHour < forecastFrontHour,
  };
}

/* ══════════════════════════════════════════
   CHART RENDERING
   Temperature trajectory + pressure
   Uses Chart.js 4.x
══════════════════════════════════════════ */
let tempChart = null;
let pressChart = null;

function destroyCharts() {
  if (tempChart)  { tempChart.destroy();  tempChart  = null; }
  if (pressChart) { pressChart.destroy(); pressChart = null; }
}

function renderCharts(key, iso, modelsRaw, nwsHourly, metar24h, brackets, pressureData) {
  destroyCharts();

  const cfg = ST[key];
  const c = getComputedStyle(document.documentElement);
  const colorMap = {
    'GFS':       '#3b82f6',  // blue
    'ECMWF IFS': '#0e7490',  // teal
    'ICON':      '#16a34a',  // green
    'GEM GDPS':  '#d97706',  // amber
    'NWS':       '#ea580c',  // orange
  };

  // Build hour labels 0-23
  const hours = Array.from({length:24}, (_,i) => i);
  const hourLabels = hours.map(h => h%3===0 ? (h===0?'12a':h<12?h+'a':h===12?'12p':(h-12)+'p') : '');

  // Extract hourly arrays for each model for iso date
  const modelKeys = [
    {name:'GFS',      data:modelsRaw?.main,  mk:'gfs_seamless'},
    {name:'ICON',     data:modelsRaw?.main,  mk:'icon_seamless'},
    {name:'GEM GDPS', data:modelsRaw?.main,  mk:'gem_seamless'},
    {name:'ECMWF IFS',data:modelsRaw?.ecmwf, mk:''},
  ];

  // Build temperature datasets
  const tempDatasets = [];

  modelKeys.forEach(m => {
    if (!m.data) return;
    const field = m.mk ? 'temperature_2m_' + m.mk : 'temperature_2m';
    const times = m.data.hourly?.time || [];
    const vals  = m.data.hourly?.[field] || [];
    const hourTemps = new Array(24).fill(null);
    times.forEach((t,i) => {
      if (!t?.startsWith(iso)) return;
      const hr = parseInt(t.slice(11,13));
      if (hr >= 0 && hr < 24 && vals[i] !== null) hourTemps[hr] = +vals[i].toFixed(1);
    });
    // Find max for this model
    let maxT = null, maxHr = null;
    hourTemps.forEach((v,i) => { if (v!==null && (maxT===null||v>maxT)) {maxT=v;maxHr=i;} });
    const pointR = hourTemps.map((_,i) => i===maxHr ? 5 : 0);
    tempDatasets.push({
      label: m.name,
      data: hourTemps,
      borderColor: colorMap[m.name],
      backgroundColor: colorMap[m.name] + '20',
      borderWidth: m.name === 'NWS' ? 2.5 : 1.5,
      borderDash: [],
      tension: 0.4,
      pointRadius: pointR,
      pointHoverRadius: 4,
      fill: false,
    });
  });

  // NWS hourly — filter to iso date, use getHours() in local tz
  if (nwsHourly?.length) {
    const nwsHourTemps = new Array(24).fill(null);
    let nwsMaxT = null, nwsMaxHr = null;
    nwsHourly.forEach(p => {
      // startTime includes timezone offset e.g. "2026-03-16T14:00:00-04:00"
      // Filter to settlement date in city local time
      const localDate = new Date(p.startTime).toLocaleDateString('en-CA', {timeZone:cfg.tz});
      if (localDate !== iso) return;
      // Extract local hour — parse offset from startTime directly
      const dt = new Date(p.startTime);
      const h = parseInt(dt.toLocaleString('en-US', {timeZone:cfg.tz, hour:'2-digit', hour12:false}));
      const hr = (h === 24 ? 0 : h);
      if (hr >= 0 && hr < 24 && nwsHourTemps[hr] === null) {
        nwsHourTemps[hr] = p.temperature;
        if (nwsMaxT===null || p.temperature > nwsMaxT) { nwsMaxT=p.temperature; nwsMaxHr=hr; }
      }
    });
    tempDatasets.push({
      label: 'NWS',
      data: nwsHourTemps,
      borderColor: colorMap['NWS'],
      backgroundColor: colorMap['NWS'] + '20',
      borderWidth: 2.5,
      tension: 0.4,
      pointRadius: nwsHourTemps.map((_,i) => i===nwsMaxHr ? 6 : 0),
      pointHoverRadius: 4,
      fill: false,
    });
  }

  // METAR actuals
  if (metar24h?.length) {
    const actualTemps = new Array(24).fill(null);
    let actMaxT = null, actMaxHr = null;
    metar24h.forEach(m => {
      if (!m.reportTime || m.temp === undefined) return;
      const localD = new Date(m.reportTime).toLocaleDateString('en-CA', {timeZone:cfg.tz});
      if (localD !== iso) return;
      const hr = parseInt(new Date(m.reportTime)
        .toLocaleString('en-US',{timeZone:cfg.tz,hour:'numeric',hour12:false})) % 24;
      const t = Math.round(m.temp * 9/5 + 32);
      if (actualTemps[hr] === null || t > actualTemps[hr]) {
        actualTemps[hr] = t;
        if (actMaxT===null||t>actMaxT){actMaxT=t;actMaxHr=hr;}
      }
    });
    if (actualTemps.some(v=>v!==null)) {
      tempDatasets.push({
        label: 'Actual',
        data: actualTemps,
        borderColor: '#1a2332',
        backgroundColor: '#1a233240',
        borderWidth: 2.5,
        tension: 0,
        pointRadius: actualTemps.map((v,i) => v!==null ? (i===actMaxHr?7:3) : 0),
        pointStyle: actualTemps.map((v,i) => i===actMaxHr ? 'circle' : 'circle'),
        pointBackgroundColor: actualTemps.map((v,i) => i===actMaxHr ? '#1a2332' : '#fff'),
        pointBorderColor: '#1a2332',
        fill: false,
      });
    }
  }

  // Bracket threshold annotations (Y gridlines at bracket boundaries)
  const bracketThresholds = [];
  if (brackets?.length) {
    const seen = new Set();
    brackets.forEach(b => {
      if (b.lo !== null && b.lo > -900 && !seen.has(b.lo)) {
        seen.add(b.lo);
        bracketThresholds.push(b.lo);
      }
    });
  }

  // Current hour vertical line
  const nowHr = parseInt(new Date().toLocaleString('en-US',
    {timeZone:cfg.tz, hour:'numeric', hour12:false})) % 24;
  const isToday = iso === etTodayISO();

  // Y axis range: bracket thresholds + model data
  const allTemps = tempDatasets.flatMap(d => d.data.filter(v=>v!==null));
  const yMin = allTemps.length ? Math.floor(Math.min(...allTemps, ...bracketThresholds) - 3) : 40;
  const yMax = allTemps.length ? Math.ceil(Math.max(...allTemps, ...bracketThresholds) + 3) : 100;

  // Render temp chart
  const tempCtx = document.getElementById('chart-temp');
  if (!tempCtx) return;

  tempChart = new Chart(tempCtx, {
    type: 'line',
    data: { labels: hours, datasets: tempDatasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: {
            font: {family:'IBM Plex Mono', size:9},
            color: '#8896aa',
            boxWidth: 16,
            padding: 8,
            usePointStyle: true,
          }
        },
        tooltip: {
          callbacks: {
            title: ctx => {
              const h = ctx[0].label;
              return h%12===0 ? (h===0?'12 AM':'12 PM') : (h<12?h+' AM':(h-12)+' PM');
            },
            label: ctx => ctx.dataset.label + ': ' + (ctx.raw!==null?ctx.raw+'°F':'—'),
          },
          titleFont: {family:'IBM Plex Mono', size:10},
          bodyFont:  {family:'IBM Plex Mono', size:10},
        },
      },
      scales: {
        x: {
          ticks: {
            callback: (v, i) => hourLabels[i],
            font: {family:'IBM Plex Mono', size:8},
            color: '#8896aa',
            maxRotation: 0,
          },
          grid: {
            color: ctx => {
              const h = ctx.tick.value;
              return h % 3 === 0 ? '#e2e8f0' : 'transparent';
            },
          }
        },
        y: {
          min: yMin, max: yMax,
          ticks: {
            font: {family:'IBM Plex Mono', size:8},
            color: '#8896aa',
            callback: v => v + '°',
          },
          grid: {
            color: ctx => {
              const v = ctx.tick.value;
              return bracketThresholds.includes(v) ? '#3b82f640' : '#e2e8f030';
            },
            lineWidth: ctx => bracketThresholds.includes(ctx.tick.value) ? 1.5 : 0.5,
          }
        }
      }
    },
    plugins: [{
      id: 'nowLine',
      afterDraw(chart) {
        if (!isToday) return;
        const {ctx, chartArea, scales} = chart;
        const x = scales.x.getPixelForValue(nowHr);
        ctx.save();
        ctx.strokeStyle = '#6d28d9';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4,3]);
        ctx.beginPath();
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.restore();
      }
    }]
  });

  // Pressure chart
  const pressCtx = document.getElementById('chart-press');
  if (pressCtx && (pressureData?.length || metar24h?.length)) { // pressureData = pressure array
    const pressDatasets = [];

    // METAR observed pressure
    if (metar24h?.length) {
      const obsPressHours = new Array(24).fill(null);
      metar24h.forEach(m => {
        if (!m.reportTime || !m.altim) return;
        const localD = new Date(m.reportTime).toLocaleDateString('en-CA', {timeZone:cfg.tz});
        if (localD !== iso) return;
        const hr = parseInt(new Date(m.reportTime)
          .toLocaleString('en-US',{timeZone:cfg.tz,hour:'numeric',hour12:false})) % 24;
        const hpa = +(m.altim * 33.8639).toFixed(1);
        if (obsPressHours[hr] === null) obsPressHours[hr] = hpa;
      });
      if (obsPressHours.some(v=>v!==null)) {
        pressDatasets.push({
          label: 'Obs (hPa)',
          data: obsPressHours,
          borderColor: '#1a2332',
          borderWidth: 2.5,
          tension: 0.3,
          pointRadius: obsPressHours.map(v=>v!==null?3:0),
          fill: false,
        });
      }
    }

    // NWS forecast pressure
    if (pressureData?.length) {
      const fcstPress = new Array(24).fill(null);
      pressureData.forEach(p => {
        // Use pre-computed localDate from fetchPressure
        const localD = p.localDate || new Date(p.utc).toLocaleDateString('en-CA', {timeZone:cfg.tz});
        if (localD !== iso) return;
        if (p.hour >= 0 && p.hour < 24 && fcstPress[p.hour] === null) {
          fcstPress[p.hour] = p.hPa;
        }
      });
      if (fcstPress.some(v=>v!==null)) {
        pressDatasets.push({
          label: 'Fcst (hPa)',
          data: fcstPress,
          borderColor: '#ea580c',
          borderWidth: 1.5,
          borderDash: [5,3],
          tension: 0.4,
          pointRadius: 0,
          fill: false,
        });
      }
    }

    if (pressDatasets.length) {
      const allP = pressDatasets.flatMap(d=>d.data.filter(v=>v!==null));
      pressChart = new Chart(pressCtx, {
        type: 'line',
        data: { labels: hours, datasets: pressDatasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: {
              display: true, position: 'bottom',
              labels: {font:{family:'IBM Plex Mono',size:9}, color:'#8896aa', boxWidth:16, padding:8}
            },
            tooltip: {
              callbacks: {
                title: ctx => {const h=ctx[0].label;return h<12?h+' AM':(h-12)+' PM';},
                label: ctx => ctx.dataset.label + ': ' + (ctx.raw!==null?ctx.raw:'—'),
              },
              titleFont:{family:'IBM Plex Mono',size:10},
              bodyFont:{family:'IBM Plex Mono',size:10},
            }
          },
          scales: {
            x: {
              ticks: {
                callback: (v,i) => hourLabels[i],
                font:{family:'IBM Plex Mono',size:8},color:'#8896aa',maxRotation:0,
              },
              grid:{color:ctx=>ctx.tick.value%3===0?'#e2e8f0':'transparent'}
            },
            y: {
              min: allP.length?Math.floor(Math.min(...allP)-2):990,
              max: allP.length?Math.ceil(Math.max(...allP)+2):1030,
              ticks:{font:{family:'IBM Plex Mono',size:8},color:'#8896aa'},
              grid:{color:'#e2e8f050'}
            }
          }
        },
        plugins:[{
          id:'nowLinePr',
          afterDraw(chart){
            if(!isToday)return;
            const{ctx,chartArea,scales}=chart;
            const x=scales.x.getPixelForValue(nowHr);
            ctx.save();ctx.strokeStyle='#6d28d9';ctx.lineWidth=1.5;
            ctx.setLineDash([4,3]);ctx.beginPath();
            ctx.moveTo(x,chartArea.top);ctx.lineTo(x,chartArea.bottom);
            ctx.stroke();ctx.restore();
          }
        }]
      });
    }
  }
}

        <div class="obs-sub">${metar.obsHighToday!==null
          ? (metar.obsHighTime
              ? 'at '+new Date(metar.obsHighTime).toLocaleTimeString('en-US',{timeZone:cfg.tz,hour:'2-digit',minute:'2-digit',hour12:true})+' local'
              : 'confirmed so far')
          : 'awaiting obs'}</div>
      </div>
      <div class="obs-tile">
        <div class="obs-lbl">Wind</div>
        <div class="obs-val" style="font-size:15px;margin-top:4px">${windStr}</div>
        <div class="obs-sub">station ${metar.station}${metar.dewpoint !== null ? ' · T/Td ' + (metar.currentTemp - metar.dewpoint) + '°F' : ''}</div>
      </div>
    </div>`;
    // ── Mixing height tile (only when data available) ──
    const mxh = S.pressureData?.mixingHeight;
    if (mxh?.length && isToday) {
      const nowHr2 = parseInt(new Date().toLocaleString('en-US',
        {timeZone:cfg.tz, hour:'2-digit', hour12:false})) % 24;
      const mxNow = mxh.find(m => m.hour === nowHr2) || mxh[0];
      if (mxNow) {
        const mxFt = mxNow.feet;
        const mxCls = mxFt < 1000 ? 'ov-cool' : mxFt < 3000 ? 'ov-warm' : 'ov-ok';
        const mxLabel = mxFt < 500 ? 'Deep inversion' : mxFt < 1500 ? 'Shallow mixing' : mxFt < 3000 ? 'Moderate mixing' : 'Good mixing';
        h+=`<div class="obs-card" style="margin-top:-4px">
          <div class="obs-tile" style="flex:2">
            <div class="obs-lbl">Mixing Height</div>
            <div class="obs-val ${mxCls}" style="font-size:18px">${mxFt.toLocaleString()}ft</div>
            <div class="obs-sub">${mxLabel} · ${Math.round(mxNow.metres)}m · ${new Date().toLocaleTimeString('en-US',{timeZone:cfg.tz,hour:'2-digit',minute:'2-digit',hour12:true})} local</div>
          </div>
          <div class="obs-tile" style="flex:1">
            <div class="obs-lbl">T/Td Spread</div>
            <div class="obs-val" style="font-size:18px">${metar.dewpoint !== null ? (metar.currentTemp - metar.dewpoint) + '°F' : '—'}</div>
            <div class="obs-sub">${metar.dewpoint !== null ? (metar.currentTemp - metar.dewpoint >= 35 ? '🏔️ Downslope' : metar.currentTemp - metar.dewpoint >= 25 ? '💨 Dry air' : 'Normal') : '—'}</div>
          </div>
        </div>`;
      }
    }
  }

  // ── Model adjustment summary ──
  if (dist && regime) {
    const anchorLbl = dist.nudgeAnchor==='nws-hourly' ? 'vs NWS hourly track' : dist.nudgeAnchor==='weighted-mean' ? 'vs model mean (NWS hourly unavail.)' : '';
    const biasStr = dist.metarNudge!==0
      ? `${dist.metarNudge>0?'+':''}${dist.metarNudge.toFixed(1)}°F nudge ${anchorLbl}`
      : 'no obs nudge';
    const rawMu = dist.weightedMean.toFixed(1);
    const corrMu = dist.mu.toFixed(1);
    const corrSig = dist.sigmaEff.toFixed(1);
    const peakH = peakHourFor(key, iso);
    h+=`<div class="adj-bar">
      <div class="adj-row">
        <span class="adj-lbl">Distribution</span>
        <span><span class="adj-val">${regime.isBimodal?'BIMODAL BLEND':'FAT-TAIL t(ν=6)'}</span><span class="adj-regime ${regime.regimeCls}">${regime.regimeLabel}</span></span>
      </div>
      <div class="adj-row">
        <span class="adj-lbl">Weighted μ</span>
        <span class="adj-val ${dist.metarNudge>0.5?'up':dist.metarNudge<-0.5?'dn':'ok'}">${corrMu}°F
          <span style="color:var(--dim);font-weight:400">
            (raw ${rawMu}°F
            ${dist.calib && dist.calib.correction !== 0 ? (dist.calib.correction > 0 ? ' · +' : ' · ') + dist.calib.correction.toFixed(2) + '°F cal [n=' + dist.calib.n + ']' : ''}
            ${dist.metarNudge !== 0 ? ' · ' + (dist.metarNudge > 0 ? '+' : '') + dist.metarNudge.toFixed(1) + '°F ' + anchorLbl : ''})
          </span>
        </span>
      </div>
      <div class="adj-row">
        <span class="adj-lbl">Effective σ</span>
        <span class="adj-val ${regime.effectiveSigmaMult>1.3?'up':'ok'}">${corrSig}°F <span style="color:var(--dim);font-weight:400">(raw ${ens?.sigma??'—'}°F × ${regime.effectiveSigmaMult.toFixed(2)}${regime.sigmaCapped?` · capped at ${regime.sigmaCap}×`:''})</span></span>
      </div>
      <div class="adj-row">
        <span class="adj-lbl">Hours to peak</span>
        <span class="adj-val">${htp<=0?'Peak passed':htp+'h'} <span style="color:var(--dim);font-weight:400">(seasonal peak ${peakH}:00 local)</span> · Kelly ${Math.round(regime.kellyTimeDiscount*100)}%</span>
      </div>
    </div>`;
  }

  // Kalshi status bar
  if(kalshiOk){
    const popNote = S.structuredPoP !== null
      ? ` · <span style="color:var(--dim)">PoP ${S.structuredPoP}% (NWS hourly)</span>`
      : '';
    // Posterior mode label
    const obsHigh = dist?.obsHigh;
    const hm = regime?.htpMult ?? 1;
    const blend = obsHigh !== null ? Math.max(0, Math.min(1, (0.85 - hm) / 0.15)) : 0;
    const postLabel = obsHigh === null ? '' :
      blend < 0.1  ? ` · <span style="color:var(--dim)">posterior: lower-bound</span>` :
      blend > 0.9  ? ` · <span style="color:var(--dim)">posterior: point-est.</span>` :
                     ` · <span style="color:var(--dim)">posterior: blended ${Math.round(blend*100)}%</span>`;
    h+=`<div class="live-bar ok"><div class="live-dot"></div>Kalshi live · ${brackets.length} brackets${postLabel}${popNote} · ${tsStr}</div>`;
  } else {
    const dbg=S.log.length?`<div class="dbg">${S.log.join('<br>')}</div>`:'';
    h+=`<div class="live-bar fail">⚠ Kalshi unavailable${dbg}</div>`;
  }

  // ── Signal table ──
  // True % column is posterior probability — always sums to 100% across live brackets
  const postMode = dist?.obsHigh !== null
    ? (regime.htpMult <= 0.70 ? 'POST-PEAK' : regime.htpMult <= 0.85 ? 'UPDATING' : 'LIVE')
    : 'PRIOR';
  h+=`<div class="sec-hd"><div class="sec-ttl">Signals — ${dl}</div><div class="sec-meta ${sc}"><span style="font-size:9px;padding:1px 5px;border-radius:3px;margin-right:5px;background:var(--faint2);border:1px solid var(--border)">${postMode}</span>Updated ${tsStr}</div></div>`;

  if(!dist){
    h+=`<div class="err-box">Model data unavailable — check connection and refresh.</div>`;
  } else if(!sigs.length){
    h+=`<div class="err-box" style="background:var(--a-bg);border-color:var(--a-bd);color:var(--a)">Kalshi market not open yet. Model distribution shown below.</div>`;
    // Use posterior even for preview — pass synthetic bracket array
    const base = Math.round(dist.mu/2)*2 - 10;
    const previewBrackets = [];
    for(let t=base; t<=base+20; t+=2) previewBrackets.push({lo:t,hi:t+2,label:`${t}–${t+1}`,yesMid:5,yesBid:null,yesAsk:null,noBid:null,noAsk:null});
    const prev = computePosterior(previewBrackets, dist, regime);
    h+=`<div class="tbl"><table><thead><tr><th>Bracket (est.)</th><th class="r">True %</th></tr></thead><tbody>`;
    prev.forEach(b => {
      if(b.pPost*100 < 0.5) return;
      h+=`<tr><td><span class="brk">${b.lo}–${b.hi-1}°F</span></td><td class="r"><span class="pct ${pc(b.pPost*100)}">${(b.pPost*100).toFixed(1)}%</span></td></tr>`;
    });
    h+=`</tbody></table></div>`;
  } else {
    h+=`<div class="tbl"><table>
      <thead><tr><th>Bracket</th><th class="r">Mkt %</th><th class="r">True %</th><th>Action</th></tr></thead>
      <tbody>${sigs.map(s=>`<tr class="${rcls[s.signal]||''}" style="cursor:pointer" onclick="openBracketPopup('${key}', '${iso}', '${s.label}', ${s.yesMid||0})">
        <td><span class="brk">${s.label}°F</span></td>
        <td class="r"><span class="pmkt">${s.pMkt}%</span></td>
        <td class="r"><span class="pct ${pc(s.pTrue)}">${s.pTrue}%</span></td>
        <td><div class="act-cell">${s.actHtml}</div></td>
      </tr>`).join('')}</tbody></table></div>`;
  }

  // ── Model table ──
  h+=`<div class="sec-hd"><div class="sec-ttl">Model Forecasts — ${dl} High</div></div>`;
  const mdefs=[
    {lbl:'GFS',src:'NOAA · open-meteo',k:'GFS',w:'30%'},
    {lbl:'ECMWF IFS',src:'ECMWF · open-meteo',k:'ECMWF IFS',w:'35%'},
    {lbl:'ICON',src:'DWD Germany · open-meteo',k:'ICON',w:'20%'},
    {lbl:'GEM GDPS',src:'Environment Canada',k:'GEM GDPS',w:'15%'},
    {lbl:'NWS',src:`NWS ${cfg.nws.toUpperCase()}`,k:'NWS',w:'—'},
  ];
  const mu=dist?.mu??ens?.mean;
  h+=`<div class="tbl"><table><thead><tr><th>Model</th><th class="r">High</th></tr></thead><tbody>`;
  mdefs.forEach(m=>{
    const v=m.k==='NWS'?(nwsHigh?.temp??null):(ens?.models?.[m.k]??null);
    const tc=v===null?'':(mu&&Math.abs(v-mu)<1.5?'mc':v>mu?'mw':'ml');
    const run=lastRun(m.lbl==='NWS'?'NWS':m.lbl);
    h+=`<tr>
      <td>
        <span class="mn">${m.lbl}<span class="badge ${v!==null?'bf':'bn'}">${v!==null?'LIVE':'N/A'}</span>${m.w!=='—'?`<span style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:4px">wt ${m.w}</span>`:''}</span>
        <span class="ms">${m.src}</span>
        ${run?`<span class="mrun ${run.cls}">${run.lastLabel}</span>`:''}
        ${run?.nextLabel?`<span class="mrun" style="color:var(--dim)">${run.nextLabel}</span>`:''}
      </td>
      <td class="r">${v!==null?`<span class="mtemp ${tc}">${(+v).toFixed(1)}°F</span>`:`<span class="mna">—</span>`}</td>
    </tr>`;
  });
  if(ens) {
    // Market-implied σ from bracket price distribution
    // Uses yesMid as probability weight across brackets to extract implied mean and σ
    // Only use finite between-brackets — exclude open-ended tails (lo/hi = ±1e9)
    let mktMu = null, mktSigma = null, mktMuStr = '—', mktSigmaStr = '—';
    if(S.brackets && S.brackets.length >= 3) {
      const validB = S.brackets.filter(b =>
        b.yesMid > 0 &&
        b.lo !== null && b.lo > -900 &&   // exclude ≤ open lower bound
        b.hi !== null && b.hi < 1000      // exclude + open upper bound (1e9)
      );
      const totalW = validB.reduce((a,b) => a + b.yesMid, 0);
      if (totalW > 0 && validB.length >= 2) {
        const mids = validB.map(b => (b.lo + b.hi - 1) / 2); // bracket midpoint °F
        mktMu = mids.reduce((a,m,i) => a + m * validB[i].yesMid, 0) / totalW;
        const variance = mids.reduce((a,m,i) => a + validB[i].yesMid * (m - mktMu)**2, 0) / totalW;
        mktSigma = Math.sqrt(variance);
        mktMuStr = mktMu.toFixed(1);
        mktSigmaStr = mktSigma.toFixed(1);
      }
    }
    h+=`<tr class="ens-row">
      <td>
        <span class="mn">Weighted Mean</span>
        <span class="ms">${ens.n} models · raw σ=${ens.sigma}°F → eff. σ=${dist?.sigmaEff?.toFixed(1)??'—'}°F</span>
        ${mktSigma !== null ? '<span class="ms" style="color:var(--teal)">mkt-implied μ=' + mktMuStr + '°F · σ=' + mktSigmaStr + '°F</span>' : ''}
      </td>
      <td class="r"><span class="mtemp mw">${dist?.mu?.toFixed(1)??ens.mean}°F</span></td>
    </tr>`;
  }
  h+=`</tbody></table></div>`;

  // ── Temperature & Pressure Charts ──
  // Canvas IDs are destroyed and recreated on each render via renderCharts()
  const frontPos = (S.regime?.isFrontal || S.regime?.isBimodal) && S.metar
    ? analyzeFrontalPosition(S.metar24h || [], S.pressureData?.pressure || null, hoursUntilPeak(key, iso) > 0 ? new Date().getHours() + Math.round(hoursUntilPeak(key,iso)) : new Date().getHours())
    : null;

  h+=`<div class="sec-hd">
    <div class="sec-ttl">Temperature Trajectory</div>
    ${frontPos ? '<span class="front-badge ' + frontPos.cls + '">' + frontPos.label + (frontPos.tendencyHpa !== null ? ' · ' + (frontPos.tendencyHpa > 0 ? '+' : '') + frontPos.tendencyHpa + ' hPa/3h' : '') + '</span>' : ''}
  </div>`;
  h+=`<div class="chart-wrap">
    <div class="chart-canvas-wrap"><canvas id="chart-temp"></canvas></div>
  </div>`;

  // Pressure chart — only show on frontal/bimodal days or when pressure data available
  if (S.regime?.isFrontal || S.regime?.isBimodal || S.pressureData?.pressure?.length) {
    h+=`<div class="chart-wrap" style="margin-bottom:10px">
      <div class="chart-title">Pressure <span style="color:var(--dim);font-weight:400">hPa · obs + NWS forecast</span></div>
      <div class="chart-canvas-wrap-sm"><canvas id="chart-press"></canvas></div>
    </div>`;
  }

  // ── NWS Intelligence ──
  h+=`<div class="sec-hd"><div class="sec-ttl">Forecast Intelligence</div></div>`;
  if(nwsDisc){
    const flags=extractFlags(nwsDisc,ens,metar,key);
    const issued=nwsDisc.issued?new Date(nwsDisc.issued).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true,timeZoneName:'short'}):'—';
    h+=`<div class="nws-card">
      <div class="nws-hd"><div class="nws-ttl">NWS ${cfg.nws.toUpperCase()} — Decision Factors</div><div class="nws-ts">${issued}</div></div>
      <div class="nws-flags">`;
    h+=flags.length
      ?flags.map(f=>`<div class="flag ${f.cls}"><span class="flag-icon">${f.icon}</span><div><span class="flag-title">${f.title}</span><span class="flag-desc">${f.desc}</span></div></div>`).join('')
      :`<div class="nws-clean">No significant decision flags detected. Clean pattern — fat-tail Gaussian with standard σ applied.</div>`;
    h+=`</div></div>`;
  } else {
    h+=`<div class="nws-card"><div class="nws-clean">NWS discussion unavailable — <a href="https://forecast.weather.gov/product.php?site=${cfg.nws.toUpperCase()}&issuedby=${cfg.nws.toUpperCase()}&product=AFD" target="_blank" style="color:var(--b)">view at weather.gov</a></div></div>`;
  }

  // ── NWS Quick Links ──
  const nwsL = NWS_LINKS[key];
  if (nwsL) {
    h+=`<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
      <a href="${nwsL.hourly}" target="_blank" style="flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 8px;background:var(--white);border:1px solid var(--border);border-radius:7px;font-family:var(--mono);font-size:10px;color:var(--b);text-decoration:none;letter-spacing:.5px;box-shadow:var(--shadow)">
        <span>📅</span> HOURLY
      </a>
      <a href="${nwsL.afd}" target="_blank" style="flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 8px;background:var(--white);border:1px solid var(--border);border-radius:7px;font-family:var(--mono);font-size:10px;color:var(--b);text-decoration:none;letter-spacing:.5px;box-shadow:var(--shadow)">
        <span>💬</span> DISCUSSION
      </a>
      <a href="${nwsL.obs}" target="_blank" style="flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 8px;background:var(--white);border:1px solid var(--border);border-radius:7px;font-family:var(--mono);font-size:10px;color:var(--b);text-decoration:none;letter-spacing:.5px;box-shadow:var(--shadow)">
        <span>🌡️</span> OBSERVED
      </a>
    </div>`;
  }

  document.getElementById('desk-body').innerHTML=h;

  // Render charts after DOM is updated
  requestAnimationFrame(() => {
    renderCharts(
      key, iso,
      S.modelsRaw || null,
      S.nwsHourly || null,
      S.metar24h  || null,
      brackets,
      S.pressureData?.pressure || null
    );
  });
}

/* ══════════════════════════════════════════
   LOAD
══════════════════════════════════════════ */
async function loadCity(){
  const {key,day:iso}=S;
  if(!key||!iso) return;
  const ck=`${key}_${iso}`;
  S.log=[];

  document.getElementById('desk-body').innerHTML=`
    <div class="loading"><div class="spin"></div>
    <div class="load-txt">Fetching models · Kalshi · NWS · METAR<br>
    Correcting distribution · Computing signals<br>
    <span style="font-size:10px">${ST[key].n} · ${fmtDateLong(iso)}</span></div></div>`;

  // ── Proxy wake-up ping ──
  // Render free tier spins down after 15min inactivity.
  // Fire a /health ping immediately so the server is warm
  // by the time the real Kalshi request fires (~1-2s later).
  fetch(`${PROXY}/health`).catch(()=>{});

  try {
    await loadCalibration(); // load once, cached after first call
    let c=CACHE[ck];
    if(!c||Date.now()-c.ts>TTL){
      const [modR,kalR,nwsR,discR,metR,hourR,pressR]=await Promise.allSettled([
        fetchModels(key),
        fetchKalshi(key,iso,S.log),
        fetchNWSFcst(key),
        fetchNWSDisc(key),
        fetchMetar(key,iso),
        fetchNWSHourly(key),
        fetchPressure(key),
      ]);
      if(modR.status==='rejected') S.log.push(`Open-Meteo: ${modR.reason}`);
      if(kalR.status==='rejected') S.log.push(`Kalshi: ${kalR.reason}`);
      if(metR.status==='rejected') S.log.push(`METAR: ${metR.reason}`);
      c={
        modRaw:       modR.status==='fulfilled'?modR.value:null,
        kalMkts:      kalR.status==='fulfilled'?kalR.value:[],
        nwsPer:       nwsR.status==='fulfilled'?nwsR.value:null,
        nwsD:         discR.status==='fulfilled'?discR.value:null,
        metar:        metR.status==='fulfilled'?metR.value:null,
        nwsHourly:    hourR.status==='fulfilled'?hourR.value:null,
        pressureData: pressR.status==='fulfilled'?pressR.value:null,
        ts:Date.now(),
      };
      CACHE[ck]=c;
    }

    S.ens        = c.modRaw?parseEns(c.modRaw,iso):null;
    S.brackets   = parseBrackets(c.kalMkts);
    S.kalshiOk   = S.brackets.length>0;
    S.nwsHigh    = nwsHighForDay(c.nwsPer,iso);
    S.nwsDisc    = c.nwsD;
    S.metar      = c.metar;
    S.nwsHourly  = c.nwsHourly;
    S.fetchedAt  = new Date(c.ts);
    S.modelsRaw  = c.modRaw;  // full hourly arrays for charts
    S.metar24h   = c.metar?.history || null; // 24h obs for charts + frontal analysis
    S.pressureData = c.pressureData || null;
    if(S.ens&&S.nwsHigh?.temp) S.ens.models['NWS']=S.nwsHigh.temp;

    // ── Structured PoP from NWS hourly (more reliable than AFD text) ──
    S.structuredPoP = peakPoPForDay(c.nwsHourly, iso);

    // ── Strategy 4 divergence check ──
    S.strategy4 = detectStrategy4(S.metar, c.nwsHourly, ST[key]);

    // ── Market sum sanity check ──
    if (S.brackets.length) {
      const mktSum = S.brackets.reduce((a,b)=>a+b.yesMid,0);
      S.mktSumPct = +mktSum.toFixed(1);
      S.mktSumWarn = mktSum < 90 || mktSum > 115;
    } else {
      S.mktSumPct = null; S.mktSumWarn = false;
    }

    // ── Regime + corrected distribution ──
    const flags = S.nwsDisc ? extractFlags(S.nwsDisc, S.ens, S.metar, key) : [];
    const htp   = hoursUntilPeak(key, iso);
    S.regime    = classifyRegime(flags, S.ens?.sigma??2.5, htp);

    // Use structured PoP if available and bimodal flag is set
    const bimodalFlag = flags.find(f=>/bimodal/i.test(f.title));
    if (bimodalFlag && S.regime.isBimodal) {
      // Prefer structured PoP over text-parsed; fall back to flag's parsed value
      const pop = S.structuredPoP !== null
        ? Math.min(0.70, Math.max(0.20, S.structuredPoP/100))
        : (bimodalFlag.pop ?? 0.45);
      S.regime.pop = pop;
      S.log.push(`Bimodal PoP: ${S.structuredPoP !== null ? S.structuredPoP+'% (NWS hourly)' : Math.round(pop*100)+'% (AFD text)'}`);
    }

    S.dist = correctDistribution(S.ens, S.regime, S.metar, c.nwsHourly, key);

    render();
  } catch(e){
    S.log.push(`Fatal: ${e.message}`);
    document.getElementById('desk-body').innerHTML=`
      <div class="err-box"><strong>Load failed:</strong> ${e.message}
      <div class="dbg">${S.log.join('<br>')}</div></div>`;
  }
}

function reload(){
  if(!S.key||!S.day) return;
  delete CACHE[`${S.key}_${S.day}`];
  loadCity();
}

/* ══════════════════════════════════════════
   TRADE QUEUE
   Persists in localStorage. Auto-clears past
   settlement dates. Items keyed by city+date+bracket.
══════════════════════════════════════════ */
const CITY_NAMES = {
  KATL:'Atlanta GA',KAUS:'Austin TX',KBOS:'Boston MA',KORD:'Chicago IL',
  KDFW:'Dallas TX',KDEN:'Denver CO',KIAH:'Houston TX',KLAS:'Las Vegas NV',
  KLAX:'Los Angeles CA',KMIA:'Miami FL',KMSP:'Minneapolis MN',KMSY:'New Orleans LA',
  KNYC:'New York NY',KOKC:'Oklahoma City OK',KPHL:'Philadelphia PA',KPHX:'Phoenix AZ',
  KSAT:'San Antonio TX',KSFO:'San Francisco CA',KSEA:'Seattle WA',KDCA:'Washington DC'
};

function loadQueue() {
  try {
    const raw = localStorage.getItem('kwd-queue');
    if (!raw) return [];
    const q = JSON.parse(raw);
    const today = etTodayISO();
    return q.filter(item => item.date >= today);
  } catch(e) { return []; }
}

function saveQueue(q) {
  localStorage.setItem('kwd-queue', JSON.stringify(q));
}

function addToQueue(city, date, bracket, side, yesMid) {
  const q = loadQueue();
  const filtered = q.filter(i => !(i.city===city && i.date===date && i.bracket===bracket));
  filtered.push({city, cityName:CITY_NAMES[city]||city, date, bracket, side, yesMid, addedAt:Date.now()});
  saveQueue(filtered);
  renderQueue();
}

function removeFromQueue(city, date, bracket) {
  const q = loadQueue().filter(i => !(i.city===city && i.date===date && i.bracket===bracket));
  saveQueue(q);
  renderQueue();
}

function clearQueue() {
  saveQueue([]);
  renderQueue();
}

function renderQueue() {
  const el = document.getElementById('tq-list');
  if (!el) return;
  const q = loadQueue();
  if (!q.length) {
    el.innerHTML = '<div class="tq-empty">No orders queued.<br>Tap a bracket on the Desk tab<br>to add YES or NO.</div>';
    return;
  }
  q.sort((a,b) => a.date.localeCompare(b.date)||a.city.localeCompare(b.city));
  // Use DOM construction to avoid quote nesting issues
  const wrap = document.createElement('div');
  wrap.className = 'tq-list';
  q.forEach(function(item) {
    const sideCls = item.side === 'yes' ? 'tq-side-yes' : 'tq-side-no';
    const sideLabel = item.side === 'yes' ? 'YES' : 'NO';
    const noPrice = item.yesMid ? (100 - item.yesMid) : null;
    const priceStr = item.side === 'no' && noPrice ? noPrice + 'c NO' : item.yesMid ? item.yesMid + 'c YES' : '--';
    const priceColor = item.side === 'no' ? 'var(--r)' : 'var(--g)';
    const div = document.createElement('div');
    div.className = 'tq-item';
    const sideEl = document.createElement('div');
    sideEl.className = 'tq-side ' + sideCls;
    sideEl.textContent = sideLabel;
    const infoEl = document.createElement('div');
    infoEl.className = 'tq-info';
    const cityEl = document.createElement('div');
    cityEl.className = 'tq-city';
    cityEl.textContent = item.cityName || item.city;
    const brkEl = document.createElement('div');
    brkEl.className = 'tq-brk';
    brkEl.textContent = item.bracket + '\u00b0F \u00b7 ' + item.date;
    infoEl.appendChild(cityEl);
    infoEl.appendChild(brkEl);
    const priceEl = document.createElement('div');
    priceEl.className = 'tq-price';
    priceEl.style.color = priceColor;
    priceEl.textContent = priceStr;
    const removeEl = document.createElement('button');
    removeEl.className = 'tq-remove';
    removeEl.title = 'Remove';
    removeEl.textContent = '\u00d7';
    removeEl.addEventListener('click', (function(c,d,b){ return function(){ removeFromQueue(c,d,b); }; })(item.city, item.date, item.bracket));
    div.appendChild(sideEl);
    div.appendChild(infoEl);
    div.appendChild(priceEl);
    div.appendChild(removeEl);
    wrap.appendChild(div);
  });
  el.innerHTML = '';
  el.appendChild(wrap);
}

let queuePriceInterval = null;
function startQueuePriceRefresh() {
  if (queuePriceInterval) return;
  queuePriceInterval = setInterval(renderQueue, 30000);
}
function stopQueuePriceRefresh() {
  if (queuePriceInterval) { clearInterval(queuePriceInterval); queuePriceInterval = null; }
}

/* ══════════════════════════════════════════
   BRACKET POPUP
══════════════════════════════════════════ */
var popupState = {city:null, date:null, bracket:null, yesMid:null};

function openBracketPopup(city, date, bracket, yesMid) {
  popupState = {city:city, date:date, bracket:bracket, yesMid:yesMid};
  document.getElementById('popup-city-lbl').textContent = (CITY_NAMES[city]||city) + ' \u00b7 ' + date;
  document.getElementById('popup-brk-lbl').textContent = bracket + '\u00b0F';
  const q = loadQueue();
  const existing = q.find(function(i){ return i.city===city && i.date===date && i.bracket===bracket; });
  document.getElementById('popup-yes').classList.toggle('selected', !!(existing && existing.side==='yes'));
  document.getElementById('popup-no').classList.toggle('selected',  !!(existing && existing.side==='no'));
  document.getElementById('popup-remove').style.display = existing ? 'block' : 'none';
  document.getElementById('popup-overlay').classList.add('open');
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  document.getElementById('popup-yes').classList.remove('selected');
  document.getElementById('popup-no').classList.remove('selected');
}

function closePopupIfOverlay(e) {
  if (e.target === document.getElementById('popup-overlay')) closePopup();
}

function selectSide(side) {
  var city = popupState.city, date = popupState.date,
      bracket = popupState.bracket, yesMid = popupState.yesMid;
  if (!city) return;
  addToQueue(city, date, bracket, side, yesMid);
  closePopup();
}

function removeCurrentFromQueue() {
  if (popupState.city) removeFromQueue(popupState.city, popupState.date, popupState.bracket);
  closePopup();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active',
      (i===0&&tab==='desk')||(i===1&&tab==='trades')||(i===2&&tab==='stats'));
  });
  document.getElementById('tab-desk').classList.toggle('active', tab==='desk');
  document.getElementById('tab-trades').classList.toggle('active', tab==='trades');
  document.getElementById('tab-stats').classList.toggle('active', tab==='stats');
  if (tab==='trades') { renderQueue(); startQueuePriceRefresh(); }
  else { stopQueuePriceRefresh(); }
  if (tab==='stats') loadStats();
}

const SB_URL  = 'https://kwgddrsqlhmklhuisyou.supabase.co';
const SB_KEY  = 'sb_publishable_SZYfL-sCRPJJDmHRcGz4Xg_SIAYRzUp';

let statsLoaded = false;

function refreshStats() {
  statsLoaded = false;
  document.getElementById('stats-content').innerHTML =
    '<div class="stat-loading">Refreshing...</div>';
  loadStats();
}

async function loadPnlTile() {
  const wrap = document.getElementById('pnl-tile-wrap');
  if (!wrap) return;
  try {
    const r = await fetch(`${PROXY}/portfolio/balance`);
    const d = await r.json();
    const cash     = (d.balance || 0) / 100;
    const pos      = (d.portfolio_value || 0) / 100;
    const total    = cash + pos;
    wrap.innerHTML = `
      <div class="pnl-tile">
        <div class="pnl-main">
          <div class="pnl-value" style="color:var(--g)">$${total.toFixed(2)}</div>
          <div class="pnl-label">Total Account Value</div>
        </div>
        <div class="pnl-grid">
          <div class="pnl-item">
            <div class="pnl-item-v">$${cash.toFixed(2)}</div>
            <div class="pnl-item-l">Cash</div>
          </div>
          <div class="pnl-item">
            <div class="pnl-item-v" style="color:var(--a)">$${pos.toFixed(2)}</div>
            <div class="pnl-item-l">Positions</div>
          </div>
        </div>
      </div>`;
  } catch(e) {
    wrap.innerHTML = '';
  }
}

async function loadStats() {
  if (statsLoaded) return;
  const el = document.getElementById('stats-content');

  // Load P&L tile in parallel
  loadPnlTile();

  try {
    const r = await fetch(`${SB_URL}/rest/v1/trades?select=*&limit=500`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });
    const trades = await r.json();
    statsLoaded = true;
    renderStats(trades, el);
  } catch(e) {
    el.innerHTML = `<div class="stat-loading">Error loading stats: ${e.message}</div>`;
  }
}

function renderStats(trades, el) {
  // Separate settled vs open
  const settled = trades.filter(t => t.won !== null && t.contracts > 0);
  const open    = trades.filter(t => t.won === null && t.contracts > 0);
  const wins    = settled.filter(t => t.won);
  const losses  = settled.filter(t => !t.won);
  const winPct  = settled.length ? (wins.length / settled.length * 100).toFixed(1) : '—';
  const totalPnl = settled.reduce((a,t) => a + (t.pnl_cents||0), 0);
  const pnlDollars = (totalPnl / 100).toFixed(2);

  // Weighted avg price (weighted by contracts)
  const totalContracts = settled.reduce((a,t) => a + (t.contracts||0), 0);
  const weightedPrice  = totalContracts
    ? (settled.reduce((a,t) => a + (t.price||0) * (t.contracts||0), 0) / totalContracts).toFixed(1)
    : '—';

  // By price bucket (tens: 0-9, 10-19, 20-29 ... 80-89, 90+)
  const buckets = {};
  settled.forEach(t => {
    const b = Math.floor((t.price||0) / 10) * 10;
    const key = b >= 90 ? '90+' : `${b}-${b+9}`;
    if (!buckets[key]) buckets[key] = {n:0, w:0, contracts:0, priceSumWt:0};
    buckets[key].n++;
    if (t.won) buckets[key].w++;
    buckets[key].contracts += (t.contracts||0);
    buckets[key].priceSumWt += (t.price||0) * (t.contracts||0);
  });

  // By city
  const cities = {};
  settled.forEach(t => {
    if (!t.city) return;
    if (!cities[t.city]) cities[t.city] = {n:0, w:0, contracts:0, priceSumWt:0};
    cities[t.city].n++;
    if (t.won) cities[t.city].w++;
    cities[t.city].contracts += (t.contracts||0);
    cities[t.city].priceSumWt += (t.price||0) * (t.contracts||0);
  });

  const BREAK_EVEN = 67; // approximate break-even win % for typical entry range

  el.innerHTML = `
  <div class="stat-section">
    <div class="stat-hd">Overview</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-v blue">${settled.length + open.length}</div><div class="kpi-l">Total</div></div>
      <div class="kpi"><div class="kpi-v green">${wins.length}</div><div class="kpi-l">Won</div></div>
      <div class="kpi"><div class="kpi-v red">${losses.length}</div><div class="kpi-l">Lost</div></div>
      <div class="kpi"><div class="kpi-v amber">${open.length}</div><div class="kpi-l">Open</div></div>
    </div>
    <div class="kpi-row" style="margin-top:8px">
      <div class="kpi"><div class="kpi-v ${parseFloat(winPct)>=BREAK_EVEN?'green':'red'}">${winPct}%</div><div class="kpi-l">Win Rate</div></div>
      <div class="kpi"><div class="kpi-v ${totalPnl>=0?'green':'red'}">${totalPnl>=0?'+':''}$${pnlDollars}</div><div class="kpi-l">Net P&L</div></div>
      <div class="kpi"><div class="kpi-v">${weightedPrice}¢</div><div class="kpi-l">Avg YES</div></div>
      <div class="kpi"><div class="kpi-v">${totalContracts}</div><div class="kpi-l">Contracts</div></div>
    </div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dim);padding:6px 2px">
      Break-even ~67% • Avg YES price weighted by contracts
    </div>
  </div>

  <div class="stat-section">
    <div class="stat-hd">By Entry Price (YES ¢)</div>
    <div class="stat-tbl">
      <table>
        <thead><tr>
          <th>Bucket</th>
          <th class="r">Trades</th>
          <th class="r">Win%</th>
          <th class="r">Avg YES</th>
          <th class="r">P&L $</th>
        </tr></thead>
        <tbody>
          ${Object.entries(buckets)
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([k,v]) => {
              const pct = (v.w/v.n*100).toFixed(0);
              const avgYes = v.contracts ? (v.priceSumWt/v.contracts).toFixed(1) : '—';
              const bPnl = settled.filter(t => {
                const b = Math.floor((t.price||0)/10)*10;
                const key = b>=90?'90+': b+'-'+(b+9);
                return key===k;
              }).reduce((a,t)=>a+(t.pnl_cents||0),0);
              const pnlStr = (bPnl>=0?'+':'')+'$'+(bPnl/100).toFixed(2);
              const barW = Math.round(pct);
              const below = +pct < BREAK_EVEN;
              return `<tr>
                <td><span style="font-weight:500">${k}¢</span></td>
                <td class="r">${v.n}</td>
                <td class="r">
                  <div>${pct}%</div>
                  <div class="win-bar"><div class="win-fill ${below?'below':''}" style="width:${barW}%"></div></div>
                </td>
                <td class="r">${avgYes}¢</td>
                <td class="r" style="color:${bPnl>=0?'var(--g)':'var(--r)'}">${pnlStr}</td>
              </tr>`;
            }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div class="stat-section">
    <div class="stat-hd">By Strategy</div>
    <div class="stat-tbl">
      <table>
        <thead><tr>
          <th>Strategy</th>
          <th class="r">Trades</th>
          <th class="r">Win%</th>
          <th class="r">Avg YES</th>
          <th class="r">P&L $</th>
        </tr></thead>
        <tbody>
          ${['edge1','edge2','edge3','manual'].map(strat => {
            const st = settled.filter(t => t.strategy === strat);
            if (!st.length) return '';
            const sw = st.filter(t => t.won).length;
            const pct = (sw/st.length*100).toFixed(0);
            const tc = st.reduce((a,t)=>a+(t.contracts||0),0);
            const avgY = tc ? (st.reduce((a,t)=>a+(t.price||0)*(t.contracts||0),0)/tc).toFixed(1) : '—';
            const sPnl = st.reduce((a,t)=>a+(t.pnl_cents||0),0);
            const pnlStr = (sPnl>=0?'+':'')+'$'+(sPnl/100).toFixed(2);
            const below = +pct < BREAK_EVEN;
            const labels = {edge1:'Edge 1 — Longshot',edge2:'Edge 2 — Model',edge3:'Edge 3 — Exec',manual:'Manual'};
            const barCls = below ? 'win-fill below' : 'win-fill';
            const pnlColor = sPnl>=0 ? 'var(--g)' : 'var(--r)';
            return '<tr>'
              + '<td><span style="font-weight:500">' + (labels[strat]||strat) + '</span></td>'
              + '<td class="r">' + st.length + '</td>'
              + '<td class="r"><div>' + pct + '%</div>'
              + '<div class="win-bar"><div class="' + barCls + '" style="width:' + Math.round(pct) + '%"></div></div></td>'
              + '<td class="r">' + avgY + '¢</td>'
              + '<td class="r" style="color:' + pnlColor + '">' + pnlStr + '</td>'
              + '</tr>';
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div class="stat-section">
    <div class="stat-hd">By City</div>
    <div class="stat-tbl">
      <table>
        <thead><tr>
          <th>City</th>
          <th class="r">Trades</th>
          <th class="r">Win%</th>
          <th class="r">Avg YES</th>
          <th class="r">P&L $</th>
        </tr></thead>
        <tbody>
          ${Object.entries(cities)
            .sort((a,b) => b[1].n - a[1].n)
            .map(([city,v]) => {
              const pct = (v.w/v.n*100).toFixed(0);
              const avgYes = v.contracts ? (v.priceSumWt/v.contracts).toFixed(1) : '—';
              const cPnl = settled.filter(t=>t.city===city).reduce((a,t)=>a+(t.pnl_cents||0),0);
              const pnlStr = (cPnl>=0?'+':'')+'$'+(cPnl/100).toFixed(2);
              const barW = Math.round(pct);
              const below = +pct < BREAK_EVEN;
              const shortName = city.replace(/^K/,'');
              return `<tr>
                <td><span style="font-weight:500">${shortName}</span></td>
                <td class="r">${v.n}</td>
                <td class="r">
                  <div>${pct}%</div>
                  <div class="win-bar"><div class="win-fill ${below?'below':''}" style="width:${barW}%"></div></div>
                </td>
                <td class="r">${avgYes}¢</td>
                <td class="r" style="color:${cPnl>=0?'var(--g)':'var(--r)'}">${pnlStr}</td>
              </tr>`;
            }).join('')}
        </tbody>
      </table>
    </div>
  </div>
  `;
}
